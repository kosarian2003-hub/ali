<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود | خورشید</title>
<script src="assets/js/theme-init.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: { khorshid: { 950:'#081020', 900:'#0F2A4A', 800:'#153A63', 700:'#1B4F8C', 600:'#2668AC', 500:'#3E7CB8', 300:'#8FBBDE', 100:'#E4EEF8', 50:'#F5F9FD' }, sun: { 500:'#F2A83B', 400:'#F5BE64' } },
      fontFamily: { display: ['Vazirmatn','sans-serif'], body: ['Vazirmatn','sans-serif'] },
    } },
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Vazirmatn', sans-serif; }</style>
</head>
<body class="grid min-h-screen place-items-center bg-khorshid-50 px-5 py-10 text-khorshid-950 antialiased dark:bg-khorshid-950 dark:text-khorshid-100">

<div class="w-full max-w-md">
  <a href="index.html" class="mb-8 flex items-center justify-center gap-2.5">
    <span class="flex h-9 w-9 items-center justify-center rounded-full bg-khorshid-700 text-sun-400">
      <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
    </span>
    <span class="font-display text-lg font-extrabold text-khorshid-900 dark:text-white" data-i18n="brand">خورشید</span>
  </a>

  <div class="rounded-3xl border border-khorshid-100 bg-white p-8 shadow-sm dark:border-white/5 dark:bg-khorshid-900/40">
    <h1 class="font-display text-xl font-bold text-khorshid-950 dark:text-white" data-i18n="auth.login_title">ورود به حساب کاربری</h1>
    <p class="mt-1.5 text-sm text-khorshid-600 dark:text-khorshid-400" data-i18n="auth.login_subtitle">برای پیگیری سفارش‌ها و تعمیرات خود وارد شوید.</p>

    <p data-form-error class="hidden mt-4 rounded-lg bg-rose-50 px-3 py-2 text-xs text-rose-600 dark:bg-rose-500/10 dark:text-rose-400"></p>

    <form id="login-form" class="mt-6 space-y-4">
      <div>
        <label class="mb-1.5 block text-xs font-medium text-khorshid-700 dark:text-khorshid-300" data-i18n="auth.email">ایمیل</label>
        <input name="email" type="email" required class="w-full rounded-xl border border-khorshid-200 bg-transparent px-3.5 py-2.5 text-sm outline-none focus:border-khorshid-500 dark:border-white/10" />
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium text-khorshid-700 dark:text-khorshid-300" data-i18n="auth.password">رمز عبور</label>
        <input name="password" type="password" required minlength="6" class="w-full rounded-xl border border-khorshid-200 bg-transparent px-3.5 py-2.5 text-sm outline-none focus:border-khorshid-500 dark:border-white/10" />
      </div>
      <button type="submit" class="w-full rounded-xl bg-khorshid-700 py-3 text-sm font-semibold text-white hover:bg-khorshid-800" data-i18n="auth.login_button">ورود</button>
    </form>

    <p class="mt-6 text-center text-sm text-khorshid-600 dark:text-khorshid-400">
      <span data-i18n="auth.no_account">حساب کاربری ندارید؟</span>
      <a href="signup.html" data-auth-switch-link class="font-semibold text-khorshid-700 dark:text-khorshid-300" data-i18n="auth.go_signup">ثبت‌نام کنید</a>
    </p>
  </div>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
